worker_processes auto;
error_log /var/log/nginx/error.log warn;

events {
  worker_connections 1024;
}

http {
  include      /etc/nginx/mime.types;
  default_type application/octet-stream;

  # Logging
  log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                  '$status $body_bytes_sent "$http_referer" '
                  '"$http_user_agent"';
  access_log /var/log/nginx/access.log main;

  # Performance
  sendfile           on;
  keepalive_timeout  65;
  gzip               on;
  gzip_types         text/plain application/json application/javascript text/css;
  gzip_min_length    1000;

  # Seguridad
  server_tokens off;

  # ── Redirigir HTTP → HTTPS ────────────────────────────
  server {
    listen 80;
    server_name _;
    return 301 https://$host$request_uri;
  }

  # ── HTTPS principal ───────────────────────────────────
  server {
    listen 443 ssl http2;
    server_name tudominio.com;   # ← Cambia esto

    # Certificados (puedes usar Let's Encrypt o autofirmados)
    ssl_certificate     /etc/nginx/ssl/cert.pem;
    ssl_certificate_key /etc/nginx/ssl/key.pem;

    # Protocolos y cifrados seguros
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Headers de seguridad
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options           SAMEORIGIN always;
    add_header X-Content-Type-Options    nosniff always;
    add_header X-XSS-Protection          "1; mode=block" always;
    add_header Referrer-Policy           "no-referrer-when-downgrade" always;

    # Límite de body
    client_max_body_size 2M;

    # ── API → Node.js ─────────────────────────────────
    location /api/ {
      proxy_pass         http://api:3001;
      proxy_http_version 1.1;
      proxy_set_header   Upgrade          $http_upgrade;
      proxy_set_header   Connection       "upgrade";
      proxy_set_header   Host             $host;
      proxy_set_header   X-Real-IP        $remote_addr;
      proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
      proxy_set_header   X-Forwarded-Proto $scheme;
      proxy_read_timeout 30s;
      proxy_connect_timeout 10s;
    }

    location /health {
      proxy_pass http://api:3001/health;
    }

    # ── Frontend estático ─────────────────────────────
    # (cuando tengas el build de React)
    location / {
      root  /var/www/transgest;
      index index.html;
      try_files $uri $uri/ /index.html;  # SPA routing
    }
  }
}
